# makai — ビルド検証 CI
# Windows MSVC 専用プロジェクトのため Windows ランナーのみ使用する。
# FetchContent のキャッシュで2回目以降のビルドを高速化する。

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build (Windows / MSVC / ${{ matrix.build_type }})
    runs-on: windows-latest  # Visual Studio 2022 (v143) が含まれる

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      # ソースコードのチェックアウト
      - name: チェックアウト
        uses: actions/checkout@v4

      # FetchContent キャッシュの復元
      # キャッシュキーに CMakeLists.txt のハッシュを使用することで
      # 依存バージョン変更時にキャッシュを自動無効化する
      - name: FetchContent キャッシュの復元
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      # CMake 設定
      # -A x64: 64bit ターゲットを明示（CMakeLists.txt の 32bit FATAL_ERROR 回避）
      - name: CMake 設定
        run: cmake -S . -B build -A x64

      # ビルド
      # --config でビルド構成を指定（MSVC はマルチ構成ジェネレーターのため必須）
      # --parallel でコア数を自動検出して並列ビルド
      - name: ビルド
        run: cmake --build build --config ${{ matrix.build_type }} --parallel
